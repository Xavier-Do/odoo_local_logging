function attachFilterBehavior(wrapEl, { onChange, mode = 'exclusive' }){
  const btn = wrapEl.querySelector('.filter-btn');
  const label = wrapEl.querySelector('.filter-label');
  const panel = wrapEl.querySelector('.filter-panel');
  const list = wrapEl.querySelector('.fp-list');
  const allBtn = wrapEl.querySelector('.fp-all');
  const noneBtn = wrapEl.querySelector('.fp-none');

  let allValues = [];
  let selected = new Set();
  let lastClicked = null;

  function refreshHighlight(){
    list.querySelectorAll('.filter-row').forEach(row => {
      row.classList.toggle('selected', selected.has(row.dataset.value));
    });
  }

  function updateLabel(){
    if (!allValues.length) label.textContent = 'all';
    else if (selected.size === 0) label.textContent = 'none';
    else if (selected.size === allValues.length) label.textContent = 'all';
    else if (selected.size <= 2) label.textContent = [...selected].map(v => v.length > 10 ? v.slice(0, 10) + '…' : v).join(', ');
    else label.textContent = `${selected.size}/${allValues.length}`;
  }

  function setValues(values, counts, defaultSelected, renderRow){
    allValues = values;
    // Only clear the shift-click anchor if it's no longer a valid value.
    // setValues() runs on every Watch-mode poll (to refresh counts) for
    // every visible filter column, not just when the user opens one —
    // unconditionally nulling this would break a click-then-shift-click
    // gesture any time a poll happened to land in between the two clicks.
    if (lastClicked !== null && !values.includes(lastClicked)){
      lastClicked = null;
    }
    if (!values.length){
      list.innerHTML = `<div class="filter-empty">None found</div>`;
      selected = new Set();
      updateLabel();
      return;
    }
    selected = new Set(defaultSelected !== undefined ? defaultSelected : values);
    list.innerHTML = values.map(v => renderRow(v, counts)).join('');
    refreshHighlight();
    updateLabel();
  }

  list.addEventListener('click', e => {
    const row = e.target.closest('.filter-row');
    if (!row) return;
    const value = row.dataset.value;
    const index = allValues.indexOf(value);

    if (e.shiftKey && lastClicked !== null){
      const anchor = allValues.indexOf(lastClicked);
      const [lo, hi] = anchor < index ? [anchor, index] : [index, anchor];
      const range = allValues.slice(lo, hi + 1);
      if (mode === 'toggle'){
        range.forEach(v => selected.add(v));
      } else {
        selected = new Set(range);
      }
    } else if (mode === 'toggle' || e.ctrlKey || e.metaKey){
      if (selected.has(value)) selected.delete(value);
      else selected.add(value);
      lastClicked = value;
    } else {
      selected = new Set([value]);
      lastClicked = value;
    }

    refreshHighlight();
    updateLabel();
    onChange();
  });

  allBtn.addEventListener('click', () => {
    selected = new Set(allValues);
    refreshHighlight(); updateLabel(); onChange();
  });

  noneBtn.addEventListener('click', () => {
    selected = new Set();
    refreshHighlight(); updateLabel(); onChange();
  });

  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-panel').forEach(p => { if (p !== panel) p.classList.add('hidden'); });
    panel.classList.toggle('hidden');
  });

  return {
    get selected(){ return selected; },
    get allValues(){ return allValues; },
    setValues,
  };
}

/* ---------------------------------------------------------------------
 * localStorage persistence.
 * Columns are saved automatically on every change.
 * Filters are only saved when the "Save filters as default" button is
 * pressed — they are not auto-saved on every click.
 * ------------------------------------------------------------------- */
const STORAGE_KEY_COLUMNS = 'logviewer.columns.v1';
const STORAGE_KEY_FILTERS = 'logviewer.filters.v1';

function loadSavedColumns(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_COLUMNS);
    const parsed = raw ? JSON.parse(raw) : null;
    return Array.isArray(parsed) ? parsed : null;
  } catch (e) { return null; }
}

function saveColumnsToStorage(cols){
  try { localStorage.setItem(STORAGE_KEY_COLUMNS, JSON.stringify(cols)); } catch (e) { /* storage unavailable, ignore */ }
}

function loadSavedFilters(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_FILTERS);
    const parsed = raw ? JSON.parse(raw) : {};
    return (parsed && typeof parsed === 'object') ? parsed : {};
  } catch (e) { return {}; }
}

function saveFiltersToStorage(filtersObj){
  try { localStorage.setItem(STORAGE_KEY_FILTERS, JSON.stringify(filtersObj)); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_COLORIZE_OFF = 'logviewer.colorizeOff.v1';

function loadColorizeOff(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_COLORIZE_OFF);
    const parsed = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(parsed) ? parsed : []);
  } catch (e) { return new Set(); }
}

function saveColorizeOffToStorage(set){
  try { localStorage.setItem(STORAGE_KEY_COLORIZE_OFF, JSON.stringify([...set])); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_AUTO_SELECT_NEW_PIDS = 'logviewer.autoSelectNewPids.v1';

function loadAutoSelectNewPids(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_AUTO_SELECT_NEW_PIDS);
    return raw === null ? true : JSON.parse(raw); // default ON
  } catch (e) { return true; }
}

function saveAutoSelectNewPidsToStorage(value){
  try { localStorage.setItem(STORAGE_KEY_AUTO_SELECT_NEW_PIDS, JSON.stringify(value)); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_EXCLUSIVE_NEW_PID = 'logviewer.exclusiveNewPid.v1';

function loadExclusiveNewPid(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_EXCLUSIVE_NEW_PID);
    return raw === null ? false : JSON.parse(raw); // default OFF — new pids are added, not exclusive
  } catch (e) { return false; }
}

function saveExclusiveNewPidToStorage(value){
  try { localStorage.setItem(STORAGE_KEY_EXCLUSIVE_NEW_PID, JSON.stringify(value)); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_COLLAPSE_MESSAGES = 'logviewer.collapseMessages.v1';

function loadCollapseMessages(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_COLLAPSE_MESSAGES);
    return raw === null ? false : JSON.parse(raw); // default OFF — full messages shown
  } catch (e) { return false; }
}

function saveCollapseMessagesToStorage(value){
  try { localStorage.setItem(STORAGE_KEY_COLLAPSE_MESSAGES, JSON.stringify(value)); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_COLUMN_ORDER = 'logviewer.columnOrder.v1';

function loadColumnOrder(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_COLUMN_ORDER);
    const parsed = raw ? JSON.parse(raw) : null;
    return Array.isArray(parsed) ? parsed : null;
  } catch (e) { return null; }
}

function saveColumnOrderToStorage(order){
  try { localStorage.setItem(STORAGE_KEY_COLUMN_ORDER, JSON.stringify(order)); } catch (e) { /* storage unavailable, ignore */ }
}

const STORAGE_KEY_CUSTOM_LABELS = 'logviewer.customLabels.v1';

function loadCustomLabels(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_CUSTOM_LABELS);
    const parsed = raw ? JSON.parse(raw) : {};
    return (parsed && typeof parsed === 'object') ? parsed : {};
  } catch (e) { return {}; }
}

function saveCustomLabelsToStorage(obj){
  try { localStorage.setItem(STORAGE_KEY_CUSTOM_LABELS, JSON.stringify(obj)); } catch (e) { /* storage unavailable, ignore */ }
}

let customLabels = loadCustomLabels(); // fieldName -> user-chosen display label

const STORAGE_KEY_ELAPSED_THRESHOLD = 'logviewer.elapsedThreshold.v1';

function loadElapsedThreshold(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY_ELAPSED_THRESHOLD);
    if (raw === null) return null;
    const num = JSON.parse(raw);
    return typeof num === 'number' && !isNaN(num) ? num : null;
  } catch (e) { return null; }
}

function saveElapsedThresholdToStorage(value){
  try { localStorage.setItem(STORAGE_KEY_ELAPSED_THRESHOLD, JSON.stringify(value)); } catch (e) { /* storage unavailable, ignore */ }
}

let elapsedThreshold = loadElapsedThreshold(); // seconds; lines slower than this render in red, null = off

let savedFilters = loadSavedFilters();
let colorizeOff = loadColorizeOff(); // fields where coloring has been turned off
let autoSelectNewPids = loadAutoSelectNewPids(); // opt-out: new pids join the current pid filter automatically
let exclusiveNewPid = loadExclusiveNewPid(); // opt-in: a new pid replaces the selection instead of joining it
let collapseMessages = loadCollapseMessages(); // opt-in: truncate long messages to one line by default
let columnOrder = []; // display order for ALL known fields, user-reorderable via the Columns picker

collapseMsgToggle.checked = collapseMessages;
collapseMsgToggle.addEventListener('change', () => {
  collapseMessages = collapseMsgToggle.checked;
  saveCollapseMessagesToStorage(collapseMessages);
  render();
});

document.addEventListener('click', e => {
  document.querySelectorAll('.filter-wrap').forEach(w => {
    if (!w.contains(e.target)) w.querySelector('.filter-panel').classList.add('hidden');
  });
});

/* ---------------------------------------------------------------------
 * Columns picker (toolbar) — decides which fields are shown as columns.
 * ------------------------------------------------------------------- */
let allFields = [];
let visibleColumns = new Set();
let timeRange = { from: null, to: null }; // epoch seconds, inclusive bounds; null = unbounded
let timeRangeInitializedForThisFile = false; // reset per full file load, not per column show/hide
let timeRangeApi = null; // set by buildTimeRangeColumn(); lets the row context menu drive the range

/* ---------------------------------------------------------------------
 * Right-click on a log row -> "Set as range start" / "Set as range end".
 * Only meaningful once a Time column with a range filter exists.
 * ------------------------------------------------------------------- */
const rowContextMenu = document.getElementById('rowContextMenu');
let contextMenuCreated = null;

function showRowContextMenu(x, y, created){
  contextMenuCreated = created;
  rowContextMenu.classList.remove('hidden');
  // Clamp to the viewport so it doesn't render off-screen near edges.
  const rect = rowContextMenu.getBoundingClientRect();
  const clampedX = Math.min(x, window.innerWidth - rect.width - 8);
  const clampedY = Math.min(y, window.innerHeight - rect.height - 8);
  rowContextMenu.style.left = Math.max(4, clampedX) + 'px';
  rowContextMenu.style.top = Math.max(4, clampedY) + 'px';
}

function hideRowContextMenu(){
  rowContextMenu.classList.add('hidden');
  contextMenuCreated = null;
}

rowContextMenu.addEventListener('click', e => {
  const btn = e.target.closest('button[data-action]');
  if (!btn || contextMenuCreated === null || !timeRangeApi) { hideRowContextMenu(); return; }
  if (btn.dataset.action === 'from') timeRangeApi.setFrom(contextMenuCreated);
  if (btn.dataset.action === 'to') timeRangeApi.setTo(contextMenuCreated);
  hideRowContextMenu();
});

document.addEventListener('click', hideRowContextMenu);
document.addEventListener('contextmenu', e => {
  if (!e.target.closest('#tbody td.time')) hideRowContextMenu();
});
window.addEventListener('scroll', hideRowContextMenu, true);
window.addEventListener('resize', hideRowContextMenu);
const columnFilters = new Map(); // fieldName -> filter API (only for visible, non-textual columns)

// A narrowed filter survives hiding its column: its {selected, allValues}
// snapshot moves here instead of being discarded, render() still applies
// it, and it resurfaces as a removable chip so it isn't silently invisible.
let hiddenActiveFilters = new Map(); // fieldName -> { selected: Set<string>, allValues: string[] }

const hiddenFiltersBar = document.getElementById('hiddenFiltersBar');

function showColumn(field){
  if (visibleColumns.has(field)) return;
  visibleColumns = new Set([...visibleColumns, field]);
  saveColumnsToStorage([...visibleColumns]);
  columnsFilter.setValues(columnOrder, new Map(), [...visibleColumns], renderColumnPickerRow);
  enableColumnDragReorder();
  attachRenameHandlers();
  rebuildHeader();
  render();
}

function clearHiddenFilter(field){
  if (field === 'created'){
    timeRange = { from: null, to: null };
  } else {
    hiddenActiveFilters.delete(field);
  }
  renderHiddenFilterChips();
  render();
}

function buildHiddenFilterChip(field){
  const state = hiddenActiveFilters.get(field);
  const isPid = field === 'process';
  const dropdown = buildFilterDropdownDOM(prettyLabel(field), { withShowColumn: true, withRemoveFilter: true, withAutoSelectNew: isPid });
  dropdown.querySelector('.filter-btn').classList.add('has-default');
  if (isPid) wirePidAutoSelectCheckboxes(dropdown);

  const api = attachFilterBehavior(dropdown, {
    onChange: () => {
      const stillNarrowed = api.selected.size !== api.allValues.length;
      if (stillNarrowed){
        hiddenActiveFilters.set(field, { selected: new Set(api.selected), allValues: api.allValues.slice() });
        render(); // just re-filter — rebuilding the bar here would close this open panel
      } else {
        hiddenActiveFilters.delete(field); // back to "everything" — the chip should disappear
        renderHiddenFilterChips();
        render();
      }
    }
  });

  const counts = fieldValueCounts.get(field) || new Map();
  const values = filterValuesFor(field);
  const initialSelected = [...state.selected].filter(v => values.includes(v));
  api.setValues(values, counts, initialSelected, (v, c) => renderValueFilterRow(field, v, c));

  dropdown.querySelector('.fp-showcol').addEventListener('click', () => showColumn(field));
  dropdown.querySelector('.fp-remove').addEventListener('click', () => clearHiddenFilter(field));

  return dropdown;
}

function buildHiddenTimeChip(){
  const widget = buildTimeRangeColumn({ withShowColumn: true, withRemoveFilter: true });
  timeRangeApi = widget; // keep right-click "set as range start/end" working while hidden too
  widget.wrap.querySelector('.filter-btn').classList.add('has-default');
  return widget.wrap;
}

function renderHiddenFilterChips(){
  const fields = [...hiddenActiveFilters.keys()];
  const timeHidden = !visibleColumns.has('created') && (timeRange.from !== null || timeRange.to !== null);

  if (!fields.length && !timeHidden){
    hiddenFiltersBar.classList.add('hidden');
    hiddenFiltersBar.innerHTML = '';
    return;
  }

  hiddenFiltersBar.classList.remove('hidden');
  hiddenFiltersBar.innerHTML = '';

  const label = document.createElement('span');
  label.className = 'bar-label';
  label.textContent = 'Active filters on hidden columns:';
  hiddenFiltersBar.appendChild(label);

  fields.forEach(field => hiddenFiltersBar.appendChild(buildHiddenFilterChip(field)));
  if (timeHidden) hiddenFiltersBar.appendChild(buildHiddenTimeChip());
}

const columnsFilter = attachFilterBehavior(document.getElementById('columnsFilterWrap'), {
  mode: 'toggle',
  onChange: () => {
    visibleColumns = new Set(columnsFilter.selected);
    saveColumnsToStorage([...visibleColumns]);
    rebuildHeader();
    render();
  }
});

function renderColumnPickerRow(field){
  return `<div class="filter-row" data-value="${escapeHtml(field)}" title="${escapeHtml(prettyLabel(field))}">
    <span class="drag-handle">⋮⋮</span>
    <span class="row-label">${escapeHtml(prettyLabel(field))}</span>
    <button type="button" class="rename-btn" data-field="${escapeHtml(field)}" title="Rename this column">✎</button>
  </div>`;
}

// Lets each column be renamed from the Columns picker. Must be re-called
// after every columnsFilter.setValues() call, for the same reason as
// enableColumnDragReorder — the list's innerHTML gets replaced each time.
function attachRenameHandlers(){
  const list = document.querySelector('#columnsFilterWrap .fp-list');
  if (!list) return;

  list.querySelectorAll('.rename-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation(); // don't let this also toggle the column's visibility
      const field = btn.dataset.field;
      const current = prettyLabel(field);
      const next = window.prompt('Rename this column (leave blank to reset to the default name):', current);
      if (next === null) return; // cancelled

      const trimmed = next.trim();
      const builtIn = (FIELD_META[field] && FIELD_META[field].label) || field;
      if (trimmed && trimmed !== builtIn){
        customLabels[field] = trimmed;
      } else {
        delete customLabels[field];
      }
      saveCustomLabelsToStorage(customLabels);

      columnsFilter.setValues(columnOrder, new Map(), [...visibleColumns], renderColumnPickerRow);
      enableColumnDragReorder();
      attachRenameHandlers();
      rebuildHeader();
      renderHiddenFilterChips();
    });
  });
}

// Lets the Columns picker's list be reordered by drag-and-drop. Must be
// called again after every columnsFilter.setValues() call, since that
// replaces the list's innerHTML (and any listeners attached to it).
function enableColumnDragReorder(){
  const list = document.querySelector('#columnsFilterWrap .fp-list');
  if (!list) return;

  list.querySelectorAll('.filter-row').forEach(row => {
    row.draggable = true;

    row.addEventListener('dragstart', e => {
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      // Some browsers need this set to actually start the drag.
      e.dataTransfer.setData('text/plain', row.dataset.value);
    });

    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
    });

    row.addEventListener('dragover', e => {
      e.preventDefault();
      const dragging = list.querySelector('.dragging');
      if (!dragging || dragging === row) return;
      const rect = row.getBoundingClientRect();
      const insertBefore = (e.clientY - rect.top) < rect.height / 2;
      list.insertBefore(dragging, insertBefore ? row : row.nextSibling);
    });

    row.addEventListener('drop', e => {
      e.preventDefault();
      columnOrder = [...list.querySelectorAll('.filter-row')].map(r => r.dataset.value);
      saveColumnOrderToStorage(columnOrder);
      rebuildHeader();
      render();
    });
  });
}

function renderValueFilterRow(field, value, counts){
  let labelHtml;
  if (field === '__level'){
    labelHtml = `<span class="badge lvl-${value}">${value}</span>`;
  } else if (field === 'created'){
    labelHtml = `<span>${escapeHtml(fmtTime(Number(value)))}</span>`;
  } else if (field === 'process'){
    const color = colorizeOff.has('process') ? 'inherit' : (pidColorMap.get(value) || 'inherit');
    labelHtml = `<span style="color:${color}">${escapeHtml(value)}</span>`;
  } else if (field === 'thread_native'){
    const color = colorizeOff.has('thread_native') ? 'inherit' : (threadColorMap.get(value) || 'inherit');
    labelHtml = `<span style="color:${color}">${escapeHtml(value)}</span>`;
  } else {
    labelHtml = `<span>${escapeHtml(value)}</span>`;
  }
  return `<div class="filter-row" data-value="${escapeHtml(value)}" title="${escapeHtml(value)}">
    <span class="row-label">${labelHtml}</span>
    <span class="count">${counts.get(value) || 0}</span>
  </div>`;
}


// A plain text input living directly in the Message column's header — no
// dropdown panel needed, unlike the other filters. Debounced the same way
// the old toolbar search box was. Searches message/logger/module/function/
// dbname regardless of which of those columns are actually visible.
let searchDebounceTimer = null;

function buildMessageSearchColumn(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `<input type="text" class="message-search-input" placeholder="Search message, logger, module…">`;
  const input = wrap.querySelector('.message-search-input');
  input.value = searchQuery;
  input.addEventListener('input', () => {
    searchQuery = input.value;
    clearTimeout(searchDebounceTimer);
    searchDebounceTimer = setTimeout(render, 150);
  });
  return wrap;
}

function buildElapsedThresholdColumn(){
  const wrap = document.createElement('div');
  wrap.className = 'filter-wrap';
  wrap.innerHTML = `
    <button type="button" class="filter-btn">Δt (s): <span class="filter-label">off</span></button>
    <div class="filter-panel hidden">
      <div class="filter-panel-actions">
        <button type="button" class="fp-all">Off</button>
      </div>
      <div class="time-range-fields">
        <label>Highlight in red when slower than (seconds)<input type="text" class="elapsed-threshold-input" placeholder="e.g. 1.0"></label>
      </div>
    </div>`;

  const btn = wrap.querySelector('.filter-btn');
  const label = wrap.querySelector('.filter-label');
  const panel = wrap.querySelector('.filter-panel');
  const input = wrap.querySelector('.elapsed-threshold-input');
  const offBtn = wrap.querySelector('.fp-all');

  function updateLabel(){
    label.textContent = elapsedThreshold !== null ? `> ${elapsedThreshold}s` : 'off';
  }

  function applyThreshold(){
    const raw = input.value.trim();
    if (!raw){
      elapsedThreshold = null;
      input.classList.remove('invalid');
    } else {
      const num = Number(raw);
      if (isNaN(num)){
        input.classList.add('invalid');
        return;
      }
      input.classList.remove('invalid');
      elapsedThreshold = num;
    }
    saveElapsedThresholdToStorage(elapsedThreshold);
    updateLabel();
    render();
  }

  input.value = elapsedThreshold !== null ? String(elapsedThreshold) : '';
  updateLabel();

  input.addEventListener('change', applyThreshold);
  offBtn.addEventListener('click', () => {
    input.value = '';
    input.classList.remove('invalid');
    applyThreshold();
  });

  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-panel').forEach(p => { if (p !== panel) p.classList.add('hidden'); });
    panel.classList.toggle('hidden');
  });

  return wrap;
}

function buildTimeRangeColumn({ withShowColumn = false, withRemoveFilter = false } = {}){
  const wrap = document.createElement('div');
  wrap.className = 'filter-wrap';
  wrap.innerHTML = `
    <button type="button" class="filter-btn">Time: <span class="filter-label">all</span></button>
    <div class="filter-panel hidden">
      <div class="filter-panel-actions">
        <button type="button" class="fp-all">All</button>
        <button type="button" class="fp-save" title="Save this time range as the default">Save as default</button>
        <button type="button" class="fp-clear" title="Remove the saved default time range">Clear default</button>
        ${withShowColumn ? `<button type="button" class="fp-showcol" title="Add this column back to the table">Show column</button>` : ''}
        ${withRemoveFilter ? `<button type="button" class="fp-remove" title="Remove this filter entirely">Remove filter</button>` : ''}
      </div>
      <div class="time-range-fields">
        <label>From<input type="text" class="tr-from" placeholder="YYYY/MM/DD HH:MM:SS[.mmm]"></label>
        <label>To<input type="text" class="tr-to" placeholder="YYYY/MM/DD HH:MM:SS[.mmm]"></label>
        <span class="hint">Tip: right-click a line's time to set it as start/end</span>
      </div>
    </div>`;

  const btn = wrap.querySelector('.filter-btn');
  const label = wrap.querySelector('.filter-label');
  const panel = wrap.querySelector('.filter-panel');
  const fromInput = wrap.querySelector('.tr-from');
  const toInput = wrap.querySelector('.tr-to');
  const allBtn = wrap.querySelector('.fp-all');
  const saveBtn = wrap.querySelector('.fp-save');
  const clearBtn = wrap.querySelector('.fp-clear');

  if (withShowColumn){
    wrap.querySelector('.fp-showcol').addEventListener('click', () => showColumn('created'));
  }
  if (withRemoveFilter){
    wrap.querySelector('.fp-remove').addEventListener('click', () => clearHiddenFilter('created'));
  }

  function updateLabel(){
    if (timeRange.from === null && timeRange.to === null){
      label.textContent = 'all';
    } else {
      const fromStr = timeRange.from !== null ? fmtTime(timeRange.from) : '…';
      const toStr = timeRange.to !== null ? fmtTime(timeRange.to) : '…';
      label.textContent = `${fromStr} → ${toStr}`;
    }
  }

  function updateHasDefault(){
    const saved = savedFilters.created;
    const isSaved = saved && typeof saved === 'object' && !Array.isArray(saved)
      && (saved.from !== null && saved.from !== undefined || saved.to !== null && saved.to !== undefined);
    btn.classList.toggle('has-default', !!isSaved);
    btn.title = isSaved ? 'This column has a saved default range (border highlighted). Use "Clear default" to remove it.' : '';
    clearBtn.disabled = !isSaved;
  }

  const isHiddenChipContext = withShowColumn || withRemoveFilter;

  function notifyIfClearedInHiddenChip(){
    // Only relevant when this widget lives in the hidden-filters bar: if the
    // range is now fully unbounded, this chip has nothing left to show and
    // should disappear. Rebuilding unconditionally would close this very
    // panel on every edit, so only do it once there's truly nothing left.
    if (isHiddenChipContext && timeRange.from === null && timeRange.to === null){
      renderHiddenFilterChips();
    }
  }

  function applyInputs(){
    const fromRaw = fromInput.value.trim();
    const toRaw = toInput.value.trim();
    const fromParsed = fromRaw ? parseTimeInputValue(fromRaw) : null;
    const toParsed = toRaw ? parseTimeInputValue(toRaw) : null;

    fromInput.classList.toggle('invalid', !!fromRaw && fromParsed === null);
    toInput.classList.toggle('invalid', !!toRaw && toParsed === null);

    // If "To" has no explicit milliseconds, treat it as "through the end of
    // that second" rather than its very first instant.
    const toEpoch = toParsed ? (toParsed.hasMs ? toParsed.epoch : toParsed.epoch + 0.999) : null;

    timeRange = {
      from: fromParsed ? fromParsed.epoch : null,
      to: toEpoch,
    };
    updateLabel();
    render();
    notifyIfClearedInHiddenChip();
  }

  function resetToAll(){
    fromInput.value = '';
    toInput.value = '';
    fromInput.classList.remove('invalid');
    toInput.classList.remove('invalid');
    timeRange = { from: null, to: null };
    updateLabel();
    render();
    notifyIfClearedInHiddenChip();
  }

  // Initial state: on first build for this file, load a saved default range
  // if present. On later rebuilds (e.g. re-showing this column after hiding
  // it mid-session), keep whatever range is already active instead of
  // clobbering it back to the saved default.
  if (!timeRangeInitializedForThisFile){
    const saved = savedFilters.created;
    if (saved && typeof saved === 'object' && !Array.isArray(saved)){
      timeRange = { from: saved.from ?? null, to: saved.to ?? null };
    } else {
      timeRange = { from: null, to: null };
    }
    timeRangeInitializedForThisFile = true;
  }
  fromInput.value = timeRange.from !== null ? fmtTimeInputValue(timeRange.from) : '';
  toInput.value = timeRange.to !== null ? fmtTimeInputValue(timeRange.to) : '';
  updateLabel();
  updateHasDefault();

  fromInput.addEventListener('change', applyInputs);
  toInput.addEventListener('change', applyInputs);
  allBtn.addEventListener('click', resetToAll);

  saveBtn.addEventListener('click', () => {
    savedFilters = { ...savedFilters, created: { from: timeRange.from, to: timeRange.to } };
    saveFiltersToStorage(savedFilters);
    updateHasDefault();
    const original = saveBtn.textContent;
    saveBtn.textContent = 'Saved ✓';
    setTimeout(() => { saveBtn.textContent = original; }, 1000);
  });

  clearBtn.addEventListener('click', () => {
    if (clearBtn.disabled) return;
    const rest = { ...savedFilters };
    delete rest.created;
    savedFilters = rest;
    saveFiltersToStorage(savedFilters);
    updateHasDefault();
    resetToAll();
    const original = clearBtn.textContent;
    clearBtn.textContent = 'Cleared';
    setTimeout(() => { clearBtn.textContent = original; }, 1000);
  });

  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-panel').forEach(p => { if (p !== panel) p.classList.add('hidden'); });
    panel.classList.toggle('hidden');
  });

  function setFrom(epoch){
    fromInput.value = fmtTimeInputValue(epoch);
    fromInput.classList.remove('invalid');
    applyInputs();
  }

  function setTo(epoch){
    toInput.value = fmtTimeInputValue(epoch);
    toInput.classList.remove('invalid');
    applyInputs();
  }

  return { wrap, setFrom, setTo };
}

// Priority: an explicitly saved localStorage default for this field (never
// for pid, which is excluded from that system), then — for pid specifically
// — the last pid seen in the file. Returns undefined ("everything") if
// neither applies. Used both by rebuildHeader (for a visible column) and by
// parseLog (to pre-apply the same default to a column that starts hidden).
function computeDefaultSelection(field, values){
  const savable = field !== 'process';
  const saved = savable ? savedFilters[field] : undefined;
  if (Array.isArray(saved)){
    const intersect = saved.filter(v => values.includes(v));
    if (intersect.length) return intersect;
  }
  if (field === 'process' && lastPidKey !== null && values.includes(lastPidKey)){
    return [lastPidKey];
  }
  return undefined;
}

function rebuildHeader(){
  // Preserve any active (narrowed) filter for a column that's about to be
  // hidden, so hiding it doesn't silently drop its filtering effect.
  columnFilters.forEach((api, field) => {
    if (visibleColumns.has(field)) return;
    if (api.selected.size !== api.allValues.length){
      hiddenActiveFilters.set(field, { selected: new Set(api.selected), allValues: api.allValues.slice() });
    } else {
      hiddenActiveFilters.delete(field); // was "everything selected" — nothing to preserve
    }
  });

  headRow.innerHTML = '';
  columnFilters.clear();

  columnOrder.forEach(field => {
    if (!visibleColumns.has(field)) return;
    const meta = FIELD_META[field] || {};
    const th = document.createElement('th');
    // Message is the one column meant to absorb all leftover space. Every
    // other column needs SOME declared width under table-layout:fixed, or
    // it splits the leftover space evenly with Message regardless of how
    // little content it actually has (e.g. a short custom "commit" field
    // would otherwise claim as much room as the message text itself).
    if (meta.width){
      th.style.width = meta.width;
    } else if (field !== 'message'){
      th.style.width = '140px';
    }

    if (field === '__elapsed'){
      th.appendChild(buildElapsedThresholdColumn());
    } else if (field === 'message'){
      th.appendChild(buildMessageSearchColumn());
    } else if (meta.textual){
      th.textContent = meta.label || field;
      th.classList.add('th-text');
    } else if (field === 'created'){
      const timeRangeWidget = buildTimeRangeColumn();
      timeRangeApi = timeRangeWidget;
      th.appendChild(timeRangeWidget.wrap);
    } else {
      const savable = field !== 'process'; // pid filters are never saved/restored
      const colorizable = field === 'process' || field === 'thread_native';
      const isPid = field === 'process';
      const dropdown = buildFilterDropdownDOM(prettyLabel(field), { withSave: savable, withColorize: colorizable, withAutoSelectNew: isPid });
      th.appendChild(dropdown);
      const api = attachFilterBehavior(dropdown, { onChange: render });

      const counts = fieldValueCounts.get(field) || new Map();
      const values = field === '__level'
        ? LEVELS.slice()
        : sortValues(fieldValueOrder.get(field) || []);

      // Priority: a filter preserved from when this column was hidden, then
      // an explicitly saved default (never for pid), then (for pid
      // specifically) the last pid seen in the file, then "all".
      let defaultSelected;
      const restored = hiddenActiveFilters.get(field);
      if (restored){
        defaultSelected = [...restored.selected].filter(v => values.includes(v));
        hiddenActiveFilters.delete(field); // now live again via this visible column
      } else {
        defaultSelected = computeDefaultSelection(field, values);
      }

      api.setValues(values, counts, defaultSelected, (v, c) => renderValueFilterRow(field, v, c));
      columnFilters.set(field, api);

      const filterBtn = dropdown.querySelector('.filter-btn');
      const saveBtn = dropdown.querySelector('.fp-save');
      const clearBtn = dropdown.querySelector('.fp-clear');

      function updateHasDefault(){
        const isSaved = savable && Array.isArray(savedFilters[field]) && savedFilters[field].length > 0;
        filterBtn.classList.toggle('has-default', isSaved);
        filterBtn.title = isSaved ? "This column has a saved default filter (border highlighted). Use \"Clear default\" to remove it." : '';
        if (clearBtn) clearBtn.disabled = !isSaved;
      }
      updateHasDefault();

      if (saveBtn){
        saveBtn.addEventListener('click', () => {
          savedFilters = { ...savedFilters, [field]: [...api.selected] };
          saveFiltersToStorage(savedFilters);
          updateHasDefault();
          const original = saveBtn.textContent;
          saveBtn.textContent = 'Saved ✓';
          setTimeout(() => { saveBtn.textContent = original; }, 1000);
        });
      }

      if (clearBtn){
        clearBtn.addEventListener('click', () => {
          if (clearBtn.disabled) return;
          const rest = { ...savedFilters };
          delete rest[field];
          savedFilters = rest;
          saveFiltersToStorage(savedFilters);
          updateHasDefault();
          // Go back to true "everything" — recomputed from scratch, so it
          // naturally includes any new values that show up in future files.
          dropdown.querySelector('.fp-all').click();
          const original = clearBtn.textContent;
          clearBtn.textContent = 'Cleared';
          setTimeout(() => { clearBtn.textContent = original; }, 1000);
        });
      }

      if (colorizable){
        const colorizeCheckbox = dropdown.querySelector('.fp-colorize-checkbox');
        colorizeCheckbox.checked = !colorizeOff.has(field);
        colorizeCheckbox.addEventListener('change', () => {
          if (colorizeCheckbox.checked) colorizeOff.delete(field);
          else colorizeOff.add(field);
          saveColorizeOffToStorage(colorizeOff);
          render();
        });
      }

      if (isPid){
        wirePidAutoSelectCheckboxes(dropdown);
      }
    }
    headRow.appendChild(th);
  });

  const iconTh = document.createElement('th');
  iconTh.style.width = '36px';
  headRow.appendChild(iconTh);

  renderHiddenFilterChips();
}

let fieldValueCounts = new Map(); // fieldName -> Map<key, count>
let fieldValueOrder = new Map();  // fieldName -> [keys in first-seen order]
let lastPidKey = null;            // last "process" value seen, in file order
let lastCreatedForElapsed = null; // last valid "created" timestamp seen, for the __elapsed virtual column

function touch(field, rawValue){
  const key = toKey(rawValue);
  if (key === null) return;
  if (!fieldValueCounts.has(field)){
    fieldValueCounts.set(field, new Map());
    fieldValueOrder.set(field, []);
  }
  const counts = fieldValueCounts.get(field);
  if (!counts.has(key)) fieldValueOrder.get(field).push(key);
  counts.set(key, (counts.get(key) || 0) + 1);
}

// Parses raw log text into entry objects, updating the global field-stat
// maps (fieldValueCounts/fieldValueOrder/lastPidKey) as a side effect.
// Used both for a full file load and for incremental "Watch" mode chunks.
function parseLinesToEntries(text){
  const lines = text.split('\n');
  const newEntries = [];
  const discovered = new Set();

  for (const line of lines){
    const trimmed = line.trim();
    if (!trimmed) continue;
    try {
      const obj = JSON.parse(trimmed);
      if (obj.levelname !== undefined){
        obj.__level = LEVEL_OVERRIDES[obj.levelno] !== undefined ? LEVEL_OVERRIDES[obj.levelno] : obj.levelname;
      }
      if (typeof obj.created === 'number'){
        if (lastCreatedForElapsed !== null){
          obj.__elapsed = obj.created - lastCreatedForElapsed;
        }
        lastCreatedForElapsed = obj.created;
      }
      if (obj.pathname && (obj.lineno !== undefined && obj.lineno !== null)){
        const path = String(obj.pathname).startsWith('/') ? obj.pathname : '/' + obj.pathname;
        obj.__vscode = `vscode://file${path}:${obj.lineno}`;
      }
      if (obj.test && typeof obj.test.canonical_tag === 'string'){
        obj.__test = obj.test.canonical_tag;
      }
      newEntries.push(obj);
      Object.keys(obj).forEach(k => {
        discovered.add(k);
        touch(k, obj[k]);
      });
      if (obj.process !== undefined && obj.process !== null){
        lastPidKey = toKey(obj.process);
      }
    } catch (e) {
      // keep unparsable lines as raw text entries
      newEntries.push({ __raw: trimmed });
    }
  }
  return { newEntries, discoveredFields: discovered };
}

function parseLog(text){
  entries = [];
  fieldValueCounts = new Map();
  fieldValueOrder = new Map();
  lastPidKey = null;
  lastCreatedForElapsed = null;
  timeRangeInitializedForThisFile = false;
  hiddenActiveFilters = new Map();

  const { newEntries, discoveredFields } = parseLinesToEntries(text);
  entries = newEntries;

  const known = FIELD_ORDER.filter(f => discoveredFields.has(f));
  const unknown = [...discoveredFields].filter(f => !FIELD_META[f]).sort();
  allFields = [...known, ...unknown];

  // User-defined column order takes priority; any field not in it yet
  // (new to this file, or never manually reordered) is appended in its
  // natural default position rather than always landing at the very end.
  const savedOrder = loadColumnOrder();
  if (savedOrder && savedOrder.length){
    const kept = savedOrder.filter(f => allFields.includes(f));
    const missing = allFields.filter(f => !kept.includes(f));
    columnOrder = [...kept, ...missing];
  } else {
    columnOrder = [...allFields];
  }

  pidColorMap = buildIdColorMap('process');
  threadColorMap = buildIdColorMap('thread_native');

  const savedColumns = loadSavedColumns();
  const savedVisible = savedColumns ? savedColumns.filter(f => allFields.includes(f)) : [];
  const defaultVisible = savedVisible.length
    ? savedVisible
    : DEFAULT_VISIBLE.filter(f => allFields.includes(f));
  visibleColumns = new Set(defaultVisible.length ? defaultVisible : allFields.slice(0, 4));

  columnsFilter.setValues(columnOrder, new Map(), [...visibleColumns], renderColumnPickerRow);
  enableColumnDragReorder();
  attachRenameHandlers();

  // A column's default filter (saved default, or "last pid" for pid) should
  // apply whether or not the column is currently visible — otherwise hiding
  // a column and reloading silently drops that filtering behavior, since
  // the default logic normally only runs while building that column's own
  // dropdown. Pre-apply it here for anything that starts out hidden.
  if (!visibleColumns.has('created')){
    const saved = savedFilters.created;
    if (saved && typeof saved === 'object' && !Array.isArray(saved)){
      timeRange = { from: saved.from ?? null, to: saved.to ?? null };
    } else {
      timeRange = { from: null, to: null };
    }
    timeRangeInitializedForThisFile = true;
  }
  allFields.forEach(field => {
    const meta = FIELD_META[field] || {};
    if (meta.textual || field === 'created' || visibleColumns.has(field)) return;
    const values = filterValuesFor(field);
    const def = computeDefaultSelection(field, values);
    if (def !== undefined){
      hiddenActiveFilters.set(field, { selected: new Set(def), allValues: values.slice() });
    }
  });

  rebuildHeader();
  dropzone.classList.add('hidden');
  wrap.classList.add('visible');
  render();
}

// Merges newly-appended lines into the already-loaded data WITHOUT resetting
// visible columns or active filter selections — used by Watch mode so a
// live-tailed view doesn't keep snapping back to defaults every poll.
function applyIncrementalText(text){
  const { newEntries, discoveredFields } = parseLinesToEntries(text);
  if (!newEntries.length) return;

  entries.push(...newEntries);

  let newFieldsAppeared = false;
  discoveredFields.forEach(f => {
    if (!allFields.includes(f)){
      allFields.push(f);
      columnOrder.push(f);
      newFieldsAppeared = true;
    }
  });

  pidColorMap = buildIdColorMap('process');
  threadColorMap = buildIdColorMap('thread_native');

  // Refresh each existing filter's value list/counts in place. A filter that
  // was previously "everything selected" stays that way (new values are
  // included automatically); a deliberately narrowed filter otherwise stays
  // exactly as narrowed — except pid, where newly-seen pids join the current
  // selection automatically unless "Auto-select new pids" is unchecked.
  columnFilters.forEach((api, field) => {
    const counts = fieldValueCounts.get(field) || new Map();
    const values = filterValuesFor(field);
    const previousAllValues = api.allValues;
    const wasEverything = api.selected.size > 0 && api.selected.size === previousAllValues.length;

    let nextSelected;
    if (wasEverything){
      nextSelected = undefined; // stays "everything" — naturally covers new values too
    } else if (field === 'process' && autoSelectNewPids){
      const newlyAppeared = values.filter(v => !previousAllValues.includes(v));
      nextSelected = (exclusiveNewPid && newlyAppeared.length)
        ? [...newlyAppeared]
        : [...api.selected, ...newlyAppeared];
    } else {
      nextSelected = [...api.selected].filter(v => values.includes(v));
    }

    api.setValues(values, counts, nextSelected, (v, c) => renderValueFilterRow(field, v, c));
  });

  // Same refresh, for a field whose column is currently hidden — its state
  // lives in hiddenActiveFilters instead of columnFilters, but it still
  // needs new values folded in the same way (in particular, pid auto-select
  // must work whether or not the Pid column happens to be visible).
  hiddenActiveFilters.forEach((state, field) => {
    const values = filterValuesFor(field);

    let nextSelected;
    if (field === 'process' && autoSelectNewPids){
      const newlyAppeared = values.filter(v => !state.allValues.includes(v));
      nextSelected = (exclusiveNewPid && newlyAppeared.length)
        ? new Set(newlyAppeared)
        : new Set([...state.selected, ...newlyAppeared]);
    } else {
      nextSelected = new Set([...state.selected].filter(v => values.includes(v)));
    }

    hiddenActiveFilters.set(field, { selected: nextSelected, allValues: values.slice() });
  });
  // Rebuilding this bar destroys and recreates every chip, including a
  // currently-open one — fine when it's a direct result of the user's own
  // action (removing a filter, showing a column), but not here, where a
  // background Watch-mode poll would otherwise slam an open chip shut out
  // from under the user. Skip the rebuild while any chip panel is open; the
  // next real trigger (closing it, or a structural change) will catch up.
  if (!hiddenFiltersBar.querySelector('.filter-panel:not(.hidden)')){
    renderHiddenFilterChips();
  }

  if (newFieldsAppeared){
    columnsFilter.setValues(columnOrder, new Map(), [...visibleColumns], renderColumnPickerRow);
    enableColumnDragReorder();
    attachRenameHandlers();
  }

  render();
}

// Matches Python traceback lines like:
//   File "/home/xdo/src/19.0/odoo/odoo/addons/base/tests/test_acl.py", line 17, in setUpClass
// and turns the "File ..., line N" portion into a vscode:// link, while
// safely escaping everything else around it (including any other matches).
const TRACEBACK_LINE_RE = /File "([^"]+)", line (\d+)/g;

function linkifyTracebacks(text){
  let result = '';
  let lastIndex = 0;
  TRACEBACK_LINE_RE.lastIndex = 0;
  let match;
  while ((match = TRACEBACK_LINE_RE.exec(text)) !== null){
    const [full, path, lineno] = match;
    result += escapeHtml(text.slice(lastIndex, match.index));
    const normalizedPath = path.startsWith('/') ? path : '/' + path;
    const href = `vscode://file${normalizedPath}:${lineno}`;
    result += `<a class="tb-link" href="${escapeHtml(href)}" title="Open in VS Code">${escapeHtml(full)}</a>`;
    lastIndex = match.index + full.length;
  }
  result += escapeHtml(text.slice(lastIndex));
  return result;
}

function formatCell(field, value, e){
  if (value === undefined || value === null) return '';
  const meta = FIELD_META[field];
  if (meta && meta.format) return meta.format(value, e);
  if (typeof value === 'object') return escapeHtml(JSON.stringify(value));
  return escapeHtml(String(value));
}

function cellClass(field){
  if (field === 'message') return collapseMessages ? 'msg truncated clickable' : 'msg expanded';
  if (field === 'created') return 'time';
  if (field === 'name') return 'logger';
  if (field === '__vscode') return 'vscode-cell';
  return '';
}

function buildRowPair(e, columns){
  const frag = document.createDocumentFragment();

  const row = document.createElement('tr');
  row.className = 'row' + ((e.__level || e.levelname) ? ' lvl-' + (e.__level || e.levelname) : '');

  const cellsHtml = columns.map(field => {
    const cls = cellClass(field);
    const clsAttr = cls ? ` class="${cls}"` : '';
    const titleAttr = (field === 'message' && collapseMessages) ? ' title="Click to show the full message"' : '';
    if (e.__raw){
      return field === 'message' ? `<td${clsAttr}${titleAttr}>${linkifyTracebacks(e.__raw)}</td>` : `<td${clsAttr}></td>`;
    }
    return `<td${clsAttr}${titleAttr}>${formatCell(field, e[field], e)}</td>`;
  }).join('');

  const expandCell = e.__raw ? '' : `<button type="button" class="expand-btn" title="Show details">▸</button>`;
  row.innerHTML = cellsHtml + `<td class="expand">${expandCell}</td>`;
  row._entry = e; // read by the delegated click/contextmenu handlers below

  const detail = document.createElement('tr');
  detail.className = 'detail hidden';
  const td = document.createElement('td');
  td.colSpan = columns.length + 1;
  detail.appendChild(td);
  // Detail JSON is built lazily on first expand (see the tbody click
  // delegate) instead of eagerly for every row on every render — with
  // thousands of rows, most never get expanded, so this saves a lot of
  // JSON.stringify + escaping work that would otherwise happen for nothing.

  frag.appendChild(row);
  frag.appendChild(detail);
  return frag;
}

// Delegated handlers, attached once (not per row) so re-rendering thousands
// of rows doesn't mean creating/destroying thousands of closures each time.
tbody.addEventListener('click', e => {
  const expandBtn = e.target.closest('.expand-btn');
  if (expandBtn){
    const row = expandBtn.closest('tr.row');
    const detail = row.nextElementSibling;
    const detailTd = detail.querySelector('td');
    if (!detailTd.dataset.rendered){
      const { __level, __elapsed, __vscode, __test, ...rawEntry } = row._entry;
      detailTd.innerHTML = `<pre>${escapeHtml(JSON.stringify(rawEntry, null, 2))}</pre>`;
      detailTd.dataset.rendered = '1';
    }
    const nowOpen = detail.classList.toggle('hidden') === false;
    expandBtn.classList.toggle('open', nowOpen);
    expandBtn.textContent = nowOpen ? '▾' : '▸';
    return;
  }

  if (e.target.closest('a.tb-link')) return; // let the link navigate, don't also toggle the cell

  const copyBtn = e.target.closest('.test-copy-btn');
  if (copyBtn){
    const text = copyBtn.dataset.copy;
    copyToClipboard(text).then(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.textContent = original; }, 1000);
    }).catch(() => {
      const original = copyBtn.textContent;
      copyBtn.textContent = '✗';
      copyBtn.title = 'Copy failed — select and copy manually: ' + text;
      setTimeout(() => { copyBtn.textContent = original; }, 1500);
    });
    return;
  }

  const msgCell = e.target.closest('td.msg.clickable');
  if (msgCell){
    msgCell.classList.toggle('truncated');
    msgCell.classList.toggle('expanded');
  }
});

tbody.addEventListener('contextmenu', e => {
  const timeCell = e.target.closest('td.time');
  if (!timeCell) return;
  const row = timeCell.closest('tr.row');
  if (!row || !row._entry || typeof row._entry.created !== 'number') return;
  e.preventDefault();
  showRowContextMenu(e.clientX, e.clientY, row._entry.created);
});

function render(){
  const q = searchQuery.toLowerCase();
  const visibleCols = columnOrder.filter(f => visibleColumns.has(f));

  const filtered = entries.filter(e => {
    if (e.__raw) return q ? e.__raw.toLowerCase().includes(q) : true;

    for (const [field, api] of columnFilters){
      if (!api.allValues.length) continue;
      const v = e[field];
      if (v === undefined || v === null) continue; // can't classify, let it through
      if (!api.selected.has(toKey(v))) return false;
    }

    for (const [field, state] of hiddenActiveFilters){
      const v = e[field];
      if (v === undefined || v === null) continue;
      if (!state.selected.has(toKey(v))) return false;
    }

    if (timeRange.from !== null || timeRange.to !== null){
      const t = e.created;
      if (typeof t === 'number'){
        if (timeRange.from !== null && t < timeRange.from) return false;
        if (timeRange.to !== null && t > timeRange.to) return false;
      }
    }

    if (q){
      const hay = `${e.message||''} ${e.name||''} ${e.module||''} ${e.funcName||''} ${e.dbname||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  stats.innerHTML = `<b>${filtered.length}</b> / ${entries.length} lines`;

  tbody.innerHTML = '';
  const frag = document.createDocumentFragment();
  filtered.forEach(e => frag.appendChild(buildRowPair(e, visibleCols)));

  // While following, surface the actual last line even if the current
  // filters would otherwise hide it — a quick, low-key "yes, it's still
  // running" signal, distinct from the real (filtered) rows above it.
  if (followEnabled && entries.length){
    const lastEntry = entries[entries.length - 1];
    const alreadyShown = filtered.length > 0 && filtered[filtered.length - 1] === lastEntry;
    if (!alreadyShown){
      const ghost = buildRowPair(lastEntry, visibleCols);
      ghost.querySelector('tr.row').classList.add('pinned-last');
      frag.appendChild(ghost);
    }
  }

  tbody.appendChild(frag);

  if (followEnabled) scrollToBottom();
  updateWatchSuggestButton();

  // The overflow-indicator pass reads layout for every truncated cell, which
  // gets expensive with thousands of rows. It's purely cosmetic, so defer it
  // a frame rather than block the filter/search click that triggered this
  // render — rows appear immediately, the accent dots settle in just after.
  requestAnimationFrame(markOverflowingMessages);
}

function markOverflowingMessages(){
  if (!collapseMessages) return; // no .truncated cells exist outside collapse mode
  const cells = tbody.querySelectorAll('td.msg.truncated');
  if (!cells.length) return;
  // Read all layout values first, then write all classes — interleaving
  // reads and writes in the same loop forces a synchronous reflow per
  // element ("layout thrashing"), which gets very slow with many rows.
  const overflowing = new Array(cells.length);
  cells.forEach((td, i) => { overflowing[i] = td.scrollWidth > td.clientWidth + 1; });
  cells.forEach((td, i) => { td.classList.toggle('overflowing', overflowing[i]); });
}

window.addEventListener('resize', markOverflowingMessages);

</script>
